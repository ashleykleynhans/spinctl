name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -race -count=1

      - name: Run coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o spinctl ./cmd/spinctl

      - name: Create tarball
        run: |
          ARCHIVE="spinctl-${GITHUB_REF_NAME#v}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "${ARCHIVE}" spinctl LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spinctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  package-deb:
    name: Package .deb (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            deb_arch: amd64
          - goarch: arm64
            deb_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o spinctl ./cmd/spinctl

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_DIR="spinctl_${VERSION}_${{ matrix.deb_arch }}"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/doc/spinctl"

          cp spinctl "${PKG_DIR}/usr/bin/"
          cp LICENSE "${PKG_DIR}/usr/share/doc/spinctl/copyright"

          cat > "${PKG_DIR}/DEBIAN/control" <<EOF
          Package: spinctl
          Version: ${VERSION}
          Section: admin
          Priority: optional
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: The spinctl Authors
          Description: Spinnaker configuration tool
           Terminal UI tool for managing Spinnaker configuration and deployment,
           replacing Halyard. Supports importing existing Halyard configurations
           and deploying Spinnaker services via Debian packages.
          EOF

          # Remove leading spaces from control file (heredoc indentation)
          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"

          dpkg-deb --build --root-owner-group "${PKG_DIR}"

          DEB_FILE="${PKG_DIR}.deb"
          echo "DEB_FILE=${DEB_FILE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spinctl-deb-${{ matrix.deb_arch }}
          path: ${{ env.DEB_FILE }}

  package-rpm:
    name: Package .rpm (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            rpm_arch: x86_64
          - goarch: arm64
            rpm_arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install rpm tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o spinctl ./cmd/spinctl

      - name: Build .rpm package
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpmbuild/BUILDROOT/spinctl-${VERSION}-1.${{ matrix.rpm_arch }}/usr/bin
          mkdir -p rpmbuild/BUILDROOT/spinctl-${VERSION}-1.${{ matrix.rpm_arch }}/usr/share/doc/spinctl

          cp spinctl rpmbuild/BUILDROOT/spinctl-${VERSION}-1.${{ matrix.rpm_arch }}/usr/bin/
          cp LICENSE rpmbuild/BUILDROOT/spinctl-${VERSION}-1.${{ matrix.rpm_arch }}/usr/share/doc/spinctl/

          cat > rpmbuild/SPECS/spinctl.spec <<EOF
          Name:    spinctl
          Version: ${VERSION}
          Release: 1
          Summary: Spinnaker configuration tool
          License: Apache-2.0
          URL:     https://github.com/ashleykleynhans/spinctl

          %description
          Terminal UI tool for managing Spinnaker configuration and deployment,
          replacing Halyard. Supports importing existing Halyard configurations
          and deploying Spinnaker services via Debian packages.

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/doc/spinctl
          cp %{_builddir}/../BUILDROOT/spinctl-${VERSION}-1.${{ matrix.rpm_arch }}/usr/bin/spinctl %{buildroot}/usr/bin/
          cp %{_builddir}/../BUILDROOT/spinctl-${VERSION}-1.${{ matrix.rpm_arch }}/usr/share/doc/spinctl/LICENSE %{buildroot}/usr/share/doc/spinctl/

          %files
          /usr/bin/spinctl
          /usr/share/doc/spinctl/LICENSE
          EOF

          # Remove leading spaces from spec file
          sed -i 's/^          //' rpmbuild/SPECS/spinctl.spec

          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
            --define "_arch ${{ matrix.rpm_arch }}" \
            --target ${{ matrix.rpm_arch }} \
            -bb rpmbuild/SPECS/spinctl.spec

          RPM_FILE=$(find rpmbuild/RPMS -name "*.rpm" | head -1)
          cp "${RPM_FILE}" .
          RPM_NAME=$(basename "${RPM_FILE}")
          echo "RPM_FILE=${RPM_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spinctl-rpm-${{ matrix.rpm_arch }}
          path: ${{ env.RPM_FILE }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, package-deb, package-rpm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
